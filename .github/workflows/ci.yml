name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -w run ci:lint

      # Next.js builds collect page data by importing each route module, which
      # tickles top-level env-var asserts in the dashboard and voting apps.
      # The values are intentionally fake — production env vars live in Vercel
      # / Railway. Real connections never happen at build time; static pages
      # that try to call Prisma fail gracefully.
      - run: pnpm -w run build
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_SECRET: ci-build-stub-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
          VOTING_NEXTAUTH_SECRET: ci-build-stub-secret-not-used-at-runtime

      - run: pnpm -w run test
